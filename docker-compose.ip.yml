# Deployment for Server 2 (Selectel) over plain HTTP on a public IP (no domain).
# API delegates generation to ComfyUI on the RunPod pod (AIV_GENERATION_BACKEND=local),
# so the RQ worker connects out to the pod's proxy URL. No GPU here.
#
#   docker compose -f docker-compose.ip.yml up -d --build
#   docker compose -f docker-compose.ip.yml exec api python -m scripts.manage create-partner --name "Site" --credits 100000

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aivideo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: aivideo
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivideo"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build: .
    command: ["api"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/workspace/api/data
      - ./config:/workspace/api/config
    ports:
      - "80:8000"
    restart: unless-stopped

  worker:
    build: .
    command: ["worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/workspace/api/data
      - ./config:/workspace/api/config
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:

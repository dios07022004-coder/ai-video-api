# NGINX reverse proxy for the AI Video API.
#   * Proxies the REST API to the FastAPI upstream.
#   * Serves generated results / uploads directly from disk (offloads FastAPI).
#   * Enforces an upload size ceiling matching AIV_MAX_UPLOAD_MB (+headroom).
#
# On RunPod, expose port 80/443; keep FastAPI bound to localhost:8000.

upstream aivideo_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 30m;      # must be >= AIV_MAX_UPLOAD_MB
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Static artifacts served straight from the data volume.
    location /files/ {
        alias /workspace/api/data/;
        add_header Cache-Control "public, max-age=86400";
        add_header Accept-Ranges bytes;      # range requests for video seeking
        try_files $uri =404;
    }

    location / {
        proxy_pass http://aivideo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location = /health {
        proxy_pass http://aivideo_api/health;
        access_log off;
    }
}
